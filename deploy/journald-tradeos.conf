# TradeOS AI — journald size caps (rotating logs, won't fill the Oracle disk).
# Install:  sudo cp deploy/journald-tradeos.conf /etc/systemd/journald.conf.d/tradeos.conf
#           sudo systemctl restart systemd-journald
[Journal]
# Persist logs across reboots, capped at 200MB total, 20MB per file.
Storage=persistent
SystemMaxUse=200M
SystemMaxFileSize=20M
# Drop anything older than 14 days even if under the size cap.
MaxRetentionSec=14day
